steps:
  # Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/finrag-repo/finrag-backend:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/finrag-repo/finrag-backend:latest'
      - '-f'
      - 'Dockerfile.backend'
      - '.'

  # Build frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/finrag-repo/finrag-frontend:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/finrag-repo/finrag-frontend:latest'
      - '-f'
      - 'Dockerfile.frontend'
      - '.'

  # Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/finrag-repo/finrag-backend'

  # Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/finrag-repo/finrag-frontend'

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'finrag-backend'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/finrag-repo/finrag-backend:$SHORT_SHA'
      - '--region=us-central1'

  # Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'finrag-frontend'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/finrag-repo/finrag-frontend:$SHORT_SHA'
      - '--region=us-central1'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
